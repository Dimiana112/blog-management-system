version: "3.9"

services:

  fastapi:

    build: .

    container_name: blog_fastapi

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      - SQLALCHEMY_DATABASE_URL=mysql+pymysql://root:@host.docker.internal:3306/blog_system_db

    depends_on:
      - redis

  redis:

    image: redis:7

    container_name: blog_redis

    ports:
      - "6379:6379"